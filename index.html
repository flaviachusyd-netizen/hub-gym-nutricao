<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:#0D0E10; --panel:#16181C; --bd:rgba(255,255,255,.08);
            --tx:#F4F5F7; --mut:#8B919A; --volt:#CCFF00;
        }
        body { margin:0; background:var(--bg); color:var(--tx); font-family:'Inter', sans-serif; padding: 20px; }
        .wrap { max-width: 1000px; margin: 0 auto; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--panel); border: 1px solid var(--bd); padding: 20px; border-radius: 14px; }
        h1 { font-family: 'Anton', sans-serif; font-size: 40px; color: var(--volt); margin: 0; text-transform: uppercase; }
        .metric-label { color: var(--mut); font-size: 12px; text-transform: uppercase; }
        .metric-value { font-size: 28px; font-weight: bold; margin: 5px 0; }
        canvas { max-width: 100%; height: 200px !important; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Painel de Performance</h1>
        
        <div class="dashboard-grid">
            <div class="card">
                <div class="metric-label">Gasto Calórico Garmin</div>
                <div class="metric-value">251 kcal</div>
            </div>
            <div class="card">
                <div class="metric-label">Saldo Calórico</div>
                <div class="metric-value" style="color: var(--volt);">+1.560</div>
            </div>
            
            <div class="card">
                <div class="metric-label">Distribuição de Macros</div>
                <canvas id="macroChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('macroChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Proteína', 'Carbo', 'Gordura'],
                datasets: [{
                    data: [180, 235, 66],
                    backgroundColor: ['#2EC4B6', '#FFC53D', '#C77DFF']
                }]
            },
            options: { plugins: { legend: { position: 'right', labels: { color: '#8B919A' } } } }
        });
    </script>
</body>
</html>
