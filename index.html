<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Performance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root { --bg:#0D0E10; --panel:#16181C; --bd:rgba(255,255,255,.08); --tx:#F4F5F7; --volt:#CCFF00; }
        body { background:var(--bg); color:var(--tx); font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--panel); border: 1px solid var(--bd); padding: 20px; border-radius: 14px; }
        .bar-container { background: var(--bd); height: 8px; border-radius: 4px; margin: 10px 0 20px; }
        .bar-fill { background: var(--volt); height: 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>PAINEL DE PERFORMANCE</h1>
    <div class="grid">
        <div class="card">
            <h3>Atividades do dia</h3>
            <div>Pernas (Força) - 520 kcal</div>
            <div class="bar-container"><div class="bar-fill" style="width: 70%;"></div></div>
            <div>Corrida leve - 240 kcal</div>
            <div class="bar-container"><div class="bar-fill" style="width: 40%;"></div></div>
        </div>
        <div class="card">
            <h3>Resumo Semanal</h3>
            <p>Calorias Queimadas: 760 kcal</p>
            <p>Calorias Consumidas: 2.320 kcal</p>
            <p style="color: var(--volt);">Saldo: +1.560 kcal</p>
        </div>
        <div class="card">
            <h3>Distribuição de Macros</h3>
            <canvas id="macroChart"></canvas>
        </div>
    </div>
    <script>
        new Chart(document.getElementById('macroChart'), {
            type: 'doughnut',
            data: {
                labels: ['Proteína', 'Carbo', 'Gordura'],
                datasets: [{ data: [180, 235, 66], backgroundColor: ['#2EC4B6', '#FFC53D', '#C77DFF'] }]
            }
        });
    </script>
</body>
</html>
