<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Performance</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        h1 { color: #ccff00; }
        .metric { font-size: 2em; font-weight: bold; }
        .label { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>PAINEL DE PERFORMANCE</h1>
    <div class="dashboard">
        <div class="card">
            <div class="label">Calorias Queimadas</div>
            <div class="metric">760 <small>kcal</small></div>
        </div>
        <div class="card">
            <div class="label">Calorias Consumidas</div>
            <div class="metric">2.320 <small>kcal</small></div>
        </div>
        <div class="card">
            <div class="label">Saldo Calórico</div>
            <div class="metric" style="color: #ccff00;">+1.560</div>
        </div>
    </div>
</body>
</html>
